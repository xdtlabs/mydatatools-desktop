# Cloud Build configuration file for building and deploying the Cloud Run service.

# --- Global Substitutions (to be set when running the build, or by a trigger) ---
# _SERVICE_NAME: The name of the Cloud Run service (e.g., gcs-downloader)
# _REGION: The region to deploy to (e.g., us-central1)
# _GCS_BUCKET: The name of the GCS bucket (e.g., my-source-files)
# _GCS_PREFIX: The folder/prefix within the bucket (e.g., data/reports/)
# _REPO_NAME: The name of the Artifact Registry Docker repository (e.g., cloud-run-source-deploy)

# Build Step: Build the Docker image
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      # Tag the image with the project ID, Repository Name, and Region
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gcs-downloader:latest'
      - '.'

  # Push Step: Push the built image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gcs-downloader:latest'

  # Deploy Step: Deploy the image to Cloud Run
  # We use the official Cloud SDK builder to run the 'gcloud run deploy' command
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Deploy
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME' # The service name substitution
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gcs-downloader:latest'
      - '--region'
      - '$_REGION' # The deployment region substitution
      - '--platform'
      - 'managed'
      # Set the environment variables required by main.py
      - '--set-env-vars'
      - 'GCS_BUCKET=$_GCS_BUCKET,GCS_FOLDER_PREFIX=$_GCS_FOLDER_PREFIX'
      - '--allow-unauthenticated' # Change this flag if you need authentication
      - '--min-instances=0'
      - '--max-instances=10'

# --- Images: Inform Cloud Build to push this specific image after the build ---
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gcs-downloader:latest'