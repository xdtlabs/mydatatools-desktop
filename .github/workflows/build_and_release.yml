name: Build and Release

on:
  push:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_python_and_flutter:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: aichat-macos.zip
            flutter_build_cmd: flutter build macos --release
            flutter_artifact_path: client/build/macos/Build/Products/Release/mydatatools-desktop.app
          # Uncomment the below sections to enable Windows and Linux builds
          # - os: windows-latest
          #   artifact_name: aichat-windows.zip
          #   flutter_build_cmd: flutter build windows --release
          #   flutter_artifact_path: client/build/windows/x64/runner/Release
          # - os: ubuntu-latest
          #   artifact_name: aichat-linux.zip
          #   flutter_build_cmd: flutter build linux --release
          #   flutter_artifact_path: client/build/linux/x64/release/bundle

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. Compile Python Service using PyInstaller
      # ==========================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.11"

      - name: Install Python Dependencies & Compile
        working-directory: client/assets/python/aichat
        run: |
          pdm install
          mkdir -p models
          huggingface-cli download bartowski/google_gemma-3-4b-it-GGUF google_gemma-3-4b-it-Q4_K_M.gguf --local-dir models 
          pdm run pyinstaller -y main.spec
        env:
          FORCE_CMAKE: "1"
          CMAKE_ARGS: ${{ matrix.os == 'macos-latest' && '-DGGML_METAL=on -DGGML_NATIVE=off' || '' }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Zip Python Executable (macOS/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: client/assets/python/aichat/dist/aichat
        run: |
          zip -r ../../../../../app/${{ matrix.artifact_name }} .

      - name: Zip Python Executable (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: client/assets/python/aichat/dist/aichat
        run: |
          Compress-Archive -Path * -DestinationPath ..\..\..\..\..\app\${{ matrix.artifact_name }}

      # ==========================================
      # 2. Build Flutter Desktop Application
      # ==========================================
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install Flutter Dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Flutter App
        working-directory: client
        run: ${{ matrix.flutter_build_cmd }}

      # ==========================================
      # 3. Zip and Upload Final Application Artifacts
      # ==========================================
      - name: Zip Final Application (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd $(dirname "${{ matrix.flutter_artifact_path }}")
          zip -r mydatatools-${{ matrix.os }}.zip $(basename "${{ matrix.flutter_artifact_path }}")

      - name: Zip Final Application (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path "${{ matrix.flutter_artifact_path }}\*" -DestinationPath "mydatatools-${{ matrix.os }}.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mydatatools-${{ matrix.os }}
          path: mydatatools-${{ matrix.os }}.zip

  release:
    name: Create GitHub Release
    needs: build_python_and_flutter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all OS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: Autogenerated Desktop Release (${{ github.sha }})
          files: artifacts/**/*.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
