# This workflow is triggered on push events but only for the main branch, develop branch, and feature/cicd branch
name: commit_actions
run-name: ${{ github.actor }} is building and releasing (to github) the mac,windows,and linux versions of the desktop

on:
  push:
    branches: [ "main", "develop", "feature/cicd" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  download-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Create models directory
        run: mkdir -p client/app/models
      - name: Install huggingface-cli
        run: pip install huggingface-hub
      - name: Download GGUF Model from Hugging Face
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import hf_hub_download
          hf_hub_download(
              repo_id='bartowski/google_gemma-3-4b-it-GGUF',
              filename='google_gemma-3-4b-it-Q4_K_M.gguf',
              local_dir='client/app/models'
          )
          "
      - name: Upload models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models
          path: client/app/models

  build-aichat-macos:
    needs: [download-assets]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4

      - name: Download models artifact
        uses: actions/download-artifact@v4
        with:
          name: models
          path: client/assets/python/aichat/models
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: brew install cmake ninja

      - name: Install Python dependencies
        working-directory: ./client/assets/python/aichat
        run: pdm install --dev
        env:
          FORCE_CMAKE: "1"
          CMAKE_ARGS: "-DGGML_METAL=on -DGGML_NATIVE=off"
          
      - name: Build Python Server
        working-directory: ./client/assets/python/aichat
        run: |
          pdm run pyinstaller -y main.spec
          mkdir -p ../../../app
          cd dist/aichat && zip -r ../../../../../app/aichat-macos.zip .

      - name: Upload Python Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aichat-macos-zip
          path: client/app/aichat-macos.zip

  build-and-release-macos:
    needs: [download-assets, build-aichat-macos]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      # Checks-out our repository under $GITHUB_WORKSPACE, so our job can access it
      - uses: actions/checkout@v4

      - name: Download models artifact
        uses: actions/download-artifact@v4
        with:
          name: models
          path: client/app/models

      - name: Download Python Artifact
        uses: actions/download-artifact@v4
        with:
          name: aichat-macos-zip
          path: client/app

      #- uses: nickwph/apple-provisioning-profile-action@v1
      #  with:
      #    profile-base64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      #- uses: nickwph/apple-build-certificate-action@v1
      #  with:
      #    certificate-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      #    certificate-password: ${{ secrets.P12_PASSWORD }}

      # Install the Apple certificate and provisioning profile
      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH
          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          ls -l $CERTIFICATE_PATH
          # Debug: Check p12 content
          openssl pkcs12 -in $CERTIFICATE_PATH -nokeys -info -passin pass:"$P12_PASSWORD" | grep "subject" || echo "No certificate subject found"

          # Download and install Apple WWDR Intermediate Certificate
          curl -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security list-keychains
          security find-identity -p codesigning
          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
            
      # Install flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter config --enable-macos-desktop
      - run: flutter --version    
      - name: print directory
        run: pwd
      - name: install flutter libs
        run: flutter pub get



      - name: Update Code Signing Settings
        run: |
          # Extract UUID from mobileprovision
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision))
          echo "Provisioning Profile UUID: $UUID"
          
          # Get the first valid identity from the keychain
          security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | head -1 | grep '"' | sed 's/.*"\(.*\)".*/\1/')
          echo "Code Signing Identity: $IDENTITY"
          
          if [ -z "$IDENTITY" ]; then
            echo "Error: No Code Signing Identity found."
            exit 1
          fi
          
          # Update project.pbxproj
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$UUID\";/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/CODE_SIGN_IDENTITY = \"-\";/CODE_SIGN_IDENTITY = \"$IDENTITY\";/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/\"CODE_SIGN_IDENTITY\[sdk=macosx\*\]\" = \"Apple Development\";/\"CODE_SIGN_IDENTITY[sdk=macosx*]\" = \"$IDENTITY\";/g" macos/Runner.xcodeproj/project.pbxproj

      - name: build macos
        run: flutter build macos --no-tree-shake-icons --release
      
      # Build DMG
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm install -g appdmg
      - name: Create DMG
        run: appdmg installers/dmg_creator/config.json build/macos/Build/Products/Release/MyDataTools.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: client/build/macos/Build/Products/Release/MyDataTools.dmg
      
      # Important! Cleanup: remove the certificate and provisioning profile from the runner!
      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision


