# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter


  localization: ^2.1.0
  #intl: ^0.18.0
  #provider: ^6.0.5
  #build_runner: ^2.3.3
  flutter_login: ^6.0.0
  go_router: ^16.2.5
  beamer: ^1.5.3
  flutter_breadcrumb: ^1.0.1
  path_provider: ^2.0.11
  file_picker: ^10.3.3
  flutter_file_dialog: ^3.0.0
  open_filex: ^4.3.2
  timeline_tile: ^2.0.0
  progressive_image: ^2.0.0
  collection: ^1.16.0
  reactive_forms: ^18.1.1
  http: ^1.1.0
  oauth2: ^2.0.1
  url_launcher: ^6.1.10
  window_to_front: ^0.0.3
  googleapis: ^15.0.0
  googleapis_auth: ^2.0.0
  moment_dart: ^5.3.0+1
  fluttertoast: ^9.0.0
  flutter_secure_storage: ^9.2.2
  pointycastle: ^3.7.2
  rsa_encrypt: ^2.0.0
  convert: ^3.1.1
  encrypt: ^5.0.1
  password_dart: ^2.0.1
  logger: ^2.0.2+1
  time: ^2.1.3
  rxdart: ^0.28.0
  json_annotation: ^4.8.1
  flutter_form_builder: ^10.1.0
  form_builder_validators: ^11.0.0
  image: ^4.0.17
  native_exif: ^0.6.0
  exif: ^3.1.4
  drift: ^2.14.1
  sqlite3: ^2.3.0
  path: ^1.8.3
  sqflite: ^2.3.0
  path_provider_platform_interface: ^2.1.1
  plugin_platform_interface: ^2.1.8
  uuid: ^4.3.3
  sqlite3_flutter_libs: ^0.5.18
  intl: ^0.20.2
  google_sign_in: ^7.2.0
